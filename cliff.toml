[changelog]
header = """
# Changelog

All notable changes to this project will be documented in this file.

"""
body = """
{%- macro remote_url() -%}
  https://github.com/{{ remote.github.owner }}/{{ remote.github.repo }}
{%- endmacro -%}

{% if version -%}
  ## [{{ version | trim_start_matches(pat="v") }}]({{ self::remote_url() }}/releases/tag/{{ version }}) — {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
  ## Unreleased
{% endif -%}

{% for group, commits in commits | group_by(attribute="group") %}
  ### {{ group | striptags | trim | upper_first }}
  {% for commit in commits %}
    - {% if commit.scope %}**{{ commit.scope }}:** {% endif %}{{ commit.message | upper_first }}\
      {% if commit.breaking %} (**BREAKING**){% endif %}\
      {% if commit.remote.username %} by @{{ commit.remote.username }}{%- endif -%}
      {{ " " }}([{{ commit.id | truncate(length=7, end="") }}]({{ self::remote_url() }}/commit/{{ commit.id }}))
  {%- endfor %}
{% endfor %}
"""
trim = true

[remote.github]
owner = "ocx-sh"
repo = "setup.ocx.sh"

[git]
conventional_commits = true
# Prerelease tags (vX.Y.Z-rc.N, …) are a publish-channel routing artifact, not a
# changelog boundary. Ignore them so their commits roll into the next stable
# release section instead of fragmenting the changelog / emptying stable notes.
ignore_tags = ".*-.*"
filter_unconventional = true
split_commits = false
protect_breaking_commits = false
filter_commits = false
topo_order = false
sort_commits = "oldest"
commit_parsers = [
    { message = "^feat", group = "Added" },
    { message = "^fix", group = "Fixed" },
    { message = "^refactor", group = "Changed" },
    { message = "^perf", group = "Changed" },
    { message = "^doc", group = "Documentation" },
    { message = "^chore", skip = true },
    { message = "^ci", skip = true },
    { message = "^style", skip = true },
    { message = "^test", skip = true },
    { message = "^build", skip = true },
]

[bump]
initial_tag = "v0.1.0"
