[tools]
elvish = "ocx.sh/elvish:latest"
git-cliff = "ocx.sh/git-cliff:2"
lychee = "ocx.sh/lychee:0"
nushell = "ocx.sh/nushell:latest"
pwsh = "ocx.sh/pwsh:latest"
shellcheck = "ocx.sh/shellcheck:0.11"
shfmt = "ocx.sh/shfmt:3"
task = "ocx.sh/go-task:3"

# fish is a UNIX-ONLY tool: the ocx.sh/fish package has no windows leaf. Keeping
# it out of the default [tools] table means project resolution on a Windows host
# (`ocx pull` / `ocx run`, which resolve the WHOLE selected scope) does not choke
# on a missing windows/amd64 fish leaf. Unix consumers select it explicitly with
# `ocx run -g all …` (or `-g default,unix`); the Windows nu/elvish smoke uses the
# default scope only, so it never references fish.
[group.unix]
fish = "ocx.sh/fish:latest"
