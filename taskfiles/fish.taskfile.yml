# yaml-language-server: $schema=https://taskfile.dev/schema.json
#
# Fish quality gate. The `fish` interpreter is bootstrapped from ocx.toml
# (binding `fish`) via `ocx run` — no system Fish required. install.fish is
# parse-checked (`fish -n`, the hard gate). The `fish_indent` format check is
# best-effort: the ocx fish package ships only the `fish` binary, so the indent
# check runs only when a `fish_indent` is otherwise available (system install).

version: '3'

tasks:
  verify:
    desc: Fish quality gate (fish -n via ocx.toml; fish_indent --check if present)
    cmds:
      - ocx run -g all fish -- fish -n src/install.fish
      - |
        if command -v fish_indent >/dev/null 2>&1; then
          fish_indent --check src/install.fish
        else
          echo "fish.taskfile: fish_indent not on PATH — skipping format check (ocx fish package ships no fish_indent)" >&2
        fi

  format:
    desc: Format install.fish with fish_indent (requires a system fish_indent)
    preconditions:
      - sh: command -v fish_indent
        msg: 'fish_indent not on PATH; install Fish to format (the ocx fish package ships no fish_indent)'
    cmd: fish_indent -w src/install.fish
