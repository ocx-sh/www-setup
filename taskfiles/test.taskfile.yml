# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

tasks:
  bootstrap:
    desc: Initialize the vendored bats submodules (external/bats-*).
    # Idempotent; safe to run repeatedly. Test tasks depend on this so a fresh
    # clone resolves bats without a manual submodule step.
    status:
      - test -x external/bats-core/bin/bats
      - test -f external/bats-support/load.bash
      - test -f external/bats-assert/load.bash
    cmds:
      - git submodule update --init --recursive

  bats:
    desc: Run the Bats install suites against the fixture HTTPS server (vendored bats)
    deps: [bootstrap]
    preconditions:
      - sh: command -v python3
        msg: 'python3 required for fixture HTTPS server'
      - sh: command -v tar
        msg: 'tar required for fixture archive build'
      - sh: command -v xz
        msg: 'xz required for fixture archive build'
      - sh: command -v sha256sum
        msg: 'sha256sum required for fixture checksum generation'
    # The nu/fish/elvish interpreters are bootstrapped from ocx.toml via `ocx run`
    # so the per-shell suites (tests/install/{nu,fish,elvish}/) actually execute
    # instead of self-skipping on `command -v`. The POSIX (sh) suites use the
    # system shell and are unaffected by the composed env.
    cmd: ocx run -g all nushell fish elvish -- external/bats-core/bin/bats -r tests/install/

  pester:
    desc: Run Pester equivalents on pwsh (bootstrapped from ocx.toml)
    cmd: |
      ocx run pwsh -- pwsh -NoProfile -Command '
        if (-not (Get-Module -ListAvailable Pester)) {
          Install-Module -Name Pester -Scope CurrentUser -Force -Repository PSGallery -SkipPublisherCheck
        }
        $cfg = New-PesterConfiguration
        $cfg.Run.Path = "tests/install/ps1"
        $cfg.Run.Exit = $true
        $cfg.Output.Verbosity = "Detailed"
        Invoke-Pester -Configuration $cfg
      '

  bats:single:
    desc: Run a single Bats file (pass FILE=path/to.bats)
    deps: [bootstrap]
    requires: { vars: [FILE] }
    cmd: external/bats-core/bin/bats {{.FILE}}
