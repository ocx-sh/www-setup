name: Verify

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Classify the change so each shell's lint gate runs only when its installer
  # (or a shared path) changed. Single source of truth: _changes.yml.
  changes:
    uses: ./.github/workflows/_changes.yml

  # ---------------------------------------------------------------------------
  # Lock currency gate: ocx.lock must be committed and current vs ocx.toml.
  # Everything below bootstraps its interpreters from this lock, so a drifted
  # lock is a fail-fast signal (ocx lock --check exits 65 on drift, 78 if absent).
  # ---------------------------------------------------------------------------
  ocx-lock:
    name: ocx.lock current
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ocx-sh/setup-ocx@de8e3366f812941423985eaccae28663ef192e8b # v1.3.0
      - run: ocx lock --check

  # ---------------------------------------------------------------------------
  # Shell lint gates. Each interpreter (shellcheck/shfmt, pwsh, nu, fish, elvish)
  # is bootstrapped from ocx.toml by the setup-ocx action, which installs ocx and
  # runs `ocx pull` to materialize the pinned toolchain — then `task <shell>:verify`
  # invokes the gate exactly as it runs locally (`ocx run <binding> -- <tool>`).
  # No ad-hoc apt/tarball shell installs.
  # ---------------------------------------------------------------------------
  shell:
    name: shellcheck + shfmt
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.sh == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ocx-sh/setup-ocx@de8e3366f812941423985eaccae28663ef192e8b # v1.3.0
      - run: task shell:verify

  pwsh:
    name: PSScriptAnalyzer
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.ps1 == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ocx-sh/setup-ocx@de8e3366f812941423985eaccae28663ef192e8b # v1.3.0
      - run: task pwsh:verify

  nu:
    name: nu --ide-check
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.nu == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ocx-sh/setup-ocx@de8e3366f812941423985eaccae28663ef192e8b # v1.3.0
      - run: task nu:verify

  fish:
    name: fish -n
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.fish == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ocx-sh/setup-ocx@de8e3366f812941423985eaccae28663ef192e8b # v1.3.0
      - run: task fish:verify

  elvish:
    name: elvish -compileonly
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.elvish == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ocx-sh/setup-ocx@de8e3366f812941423985eaccae28663ef192e8b # v1.3.0
      - run: task elvish:verify

  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: raven-actions/actionlint@205b530c5d9fa8f44ae9ed59f341a0db994aa6f8 # v2.1.2
        with:
          version: 1.7.12

  markdownlint:
    name: markdownlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: DavidAnson/markdownlint-cli2-action@8de2aa07cae85fd17c0b35642db70cf5495f1d25 # v24.0.0
        with:
          globs: |
            **/*.md
            !CHANGELOG.md
            !node_modules
            !.git
            !external

  lychee:
    name: lychee link check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          # CHANGELOG.md is git-cliff-generated at release time; it does not
          # exist pre-release, so it is not scanned yet.
          args: --cache --no-progress README.md .claude/rules/
          fail: true

  license-headers:
    name: hawkeye license check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: korandoru/hawkeye@v6
        with:
          config: .licenserc.toml

  conventional-commits:
    name: Conventional Commits
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: cocogitto/cocogitto-action@v4.2.0
        with:
          command: check
