name: Test docker matrix

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Nightly run catches breakage in upstream distro images.
    - cron: '23 4 * * *'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (default: latest)'
        required: false

permissions:
  contents: read

concurrency:
  group: docker-matrix-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Per-installer smoke matrix: each of the five thin installers (sh/nu/fish/elvish
  # AND pwsh — install.ps1 is cross-platform) is run via its own interpreter
  # against an INJECTED stub binary (network-free, deterministic). This proves each
  # installer detects the platform, takes the test hatch, places the binary at the
  # canonical bin dir, and honors print-path — across alpine/fedora/ubuntu ×
  # amd64/arm64 (linux arm64 via QEMU). pwsh is provisioned per-distro by
  # install-shells.sh (Alpine via the gcompat glibc shim; both x64/arm64).
  matrix:
    name: ${{ matrix.installer }} / ${{ matrix.distro }} / ${{ matrix.platform }}
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    # arm64 runs emulated under QEMU (slowest leg, ~15m real installs); 30m bounds
    # a hung/lost runner instead of letting it ride the 6h default. See run 29003089692.
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        installer: [sh, nu, fish, elvish, pwsh]
        distro: [alpine, fedora, ubuntu]
        platform: [linux/amd64, linux/arm64]
        exclude:
          # PowerShell ships no linux-musl-arm64 build (through 7.5.x) and the
          # glibc tarball under a gcompat shim cannot init a runspace, so pwsh on
          # Alpine is amd64-only. The other four installers still run here.
          - installer: pwsh
            distro: alpine
            platform: linux/arm64
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build the injected stub binary
        run: tests/docker/make-stub.sh "$RUNNER_TEMP/ocx-stub"

      - name: Run smoke (${{ matrix.installer }} on ${{ matrix.distro }} / ${{ matrix.platform }})
        env:
          OCX_TEST_BINARY: ${{ runner.temp }}/ocx-stub
        run: |
          tests/docker/run.sh "${{ matrix.distro }}" "${{ matrix.platform }}" latest "" "${{ matrix.installer }}"

  # ---------------------------------------------------------------------------
  # SHELL-axis activation matrix (REAL binary required).
  #
  # In the thin-installer model the installer hands off to `ocx self setup`, which
  # writes the per-shell env shims + profile/autoload blocks. A stub does NOT
  # write them, so this matrix is meaningful ONLY with a REAL ocx. No injection is
  # needed: run.sh with NO OCX_TEST_BINARY does a real network install from the
  # live dist.json, and the container's arch (native amd64 / QEMU arm64) selects
  # the matching ocx target — so the in-container install IS the real ocx. The
  # network/QEMU cost keeps this off per-commit: it runs nightly + manual dispatch.
  # It exercises the per-shell profile/autoload activation path the smoke matrix
  # (OCX_NO_MODIFY_PATH=1) never touches.
  # ---------------------------------------------------------------------------
  shell-matrix:
    name: ${{ matrix.shell }} / ${{ matrix.distro }} / ${{ matrix.platform }}
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    # arm64 runs emulated under QEMU (slowest leg, ~15m real installs); 30m bounds
    # a hung/lost runner instead of letting it ride the 6h default. See run 29003089692.
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        shell: [bash, dash, zsh, ksh, fish, nu, elvish]
        distro: [alpine, fedora, ubuntu]
        platform: [linux/amd64, linux/arm64]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Run activation (${{ matrix.shell }} on ${{ matrix.distro }} / ${{ matrix.platform }})
        env:
          VERSION_ARG: ${{ inputs.release_tag }}
        run: |
          version=${VERSION_ARG#v}
          tests/docker/run.sh "${{ matrix.distro }}" "${{ matrix.platform }}" "${version:-latest}" "${{ matrix.shell }}"
