name: Test installers

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Nightly: drives the real-release smoke jobs (live dist.json + CDN). The
    # hermetic fixture/stub jobs run on every push/PR; the networked real-release
    # legs are too flaky/external for per-commit, so they ride the nightly tick.
    - cron: '37 4 * * *'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to test against (e.g. v0.5.0). Defaults to latest.'
        required: false

permissions:
  contents: read

jobs:
  # Classify the change so per-commit jobs skip when their installer surface is
  # untouched (e.g. install.ps1-only -> Pester only; docs/ci -> nothing heavy).
  # Single source of truth: _changes.yml. On dispatch/schedule the filter reports
  # no change, so these per-commit jobs skip and the nightly real-release +
  # activation jobs (gated on the event, below) carry the run.
  changes:
    uses: ./.github/workflows/_changes.yml

  # Linux: the nu/fish/elvish interpreters are bootstrapped from ocx.toml by the
  # setup-ocx action (installs ocx + `ocx pull`); the suite runs under `ocx run
  # nushell fish elvish` so the per-shell suites EXECUTE rather than self-skip on
  # `command -v`. The cross-distro libc matrix lives in verify-distros.yml.
  bats-linux:
    name: Bats (ubuntu-latest)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.bats == 'true'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive
      - uses: ocx-sh/setup-ocx@de8e3366f812941423985eaccae28663ef192e8b # v1.3.0
      - name: Run bats (vendored, shells via ocx.toml)
        run: ocx run -g all nushell fish elvish -- external/bats-core/bin/bats -r tests/install/

  # macOS Bats: the suites are bash-3.2-safe (no negative array subscripts; the
  # fixture helper uses sha256sum-or-shasum), so the stock /bin/bash 3.2 runner
  # executes them. nu + fish + elvish are bootstrapped from ocx.toml (all three
  # have darwin leaves), so every exotic per-shell suite EXECUTES on macOS. dist.bats
  # (the gen-dist.sh generator) is a CI-side Linux tool covered by
  # bats-linux/verify-distros, not part of the macOS installer contract, so the
  # install suites are listed explicitly rather than `-r`.
  bats-macos:
    name: Bats (macos-latest)
    runs-on: macos-latest
    needs: changes
    if: needs.changes.outputs.bats == 'true'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive
      - uses: ocx-sh/setup-ocx@de8e3366f812941423985eaccae28663ef192e8b # v1.3.0
      - name: Run bats (vendored; nu/fish/elvish via ocx.toml)
        run: |
          ocx run -g all nushell fish elvish -- external/bats-core/bin/bats \
            tests/install/env-knobs.bats \
            tests/install/exit-codes.bats \
            tests/install/print-path.bats \
            tests/install/nu \
            tests/install/fish \
            tests/install/elvish

  # Windows nu/elvish smoke: install.nu and install.elv are cross-platform
  # (*-pc-windows-msvc target, ocx.exe binary). A full Bats run on Windows would
  # need bash; instead this is a fixture-free smoke (mirrors smoke-windows-51 for
  # pwsh) that drives each installer through the __OCX_TESTING_INSTALL_BINARY hatch
  # under its ocx-provisioned interpreter and asserts the PrintPath contract — the
  # only automated nu/elvish-on-Windows coverage.
  smoke-windows-nu-elvish:
    name: ${{ matrix.label }} smoke (windows-latest)
    runs-on: windows-latest
    needs: changes
    if: needs.changes.outputs.nu == 'true' || needs.changes.outputs.elvish == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: install.nu
            binding: nushell
            entry: nu src/install.nu
          - label: install.elv
            binding: elvish
            entry: elvish src/install.elv
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: ocx-sh/setup-ocx@de8e3366f812941423985eaccae28663ef192e8b # v1.3.0
        with:
          # Pre-warm only the default [tools] group. fish lives in [group.unix]
          # (no windows leaf); pulling/resolving it on Windows exits 78. The
          # default scope is all windows-capable, and `ocx run nushell|elvish`
          # below resolves that same default scope — so fish is never referenced.
          groups: default
      - name: Smoke (${{ matrix.label }})
        shell: pwsh
        run: |
          $stub = Join-Path $env:RUNNER_TEMP 'ocx.exe'
          Set-Content -Path $stub -Value '@echo 0.0.0' -Encoding ascii
          $env:OCX_HOME = Join-Path $env:RUNNER_TEMP '.ocx'
          $env:OCX_NO_MODIFY_PATH = '1'
          $env:OCX_INSTALL_NO_SETUP = '1'
          $env:OCX_INSTALL_NO_SMOKETEST = '1'
          $env:OCX_INSTALL_PRINT_PATH = '1'
          $env:__OCX_TESTING_INSTALL_BINARY = $stub
          $out = ocx run ${{ matrix.binding }} -- ${{ matrix.entry }}
          if ($LASTEXITCODE -ne 0) { throw "${{ matrix.label }} exited $LASTEXITCODE" }
          $binDir = ($out | Select-Object -Last 1)
          if (-not (Test-Path (Join-Path $binDir 'ocx.exe'))) {
            throw "expected ocx.exe under printed bin dir: $binDir"
          }

  # PowerShell 7 (pwsh) on Windows + Linux + macOS. install.ps1 is cross-platform
  # (it resolves *-unknown-linux-{gnu,musl} / *-apple-darwin targets and the `ocx`
  # binary on Unix), so the full download -> .tar.gz extract -> `self setup` path
  # EXECUTES on the POSIX hosts (ubuntu + macos) against the fixture stub. The few
  # scenarios that run the stub self-skip on Windows (the shell-script stub is not
  # a PE; Windows execution is covered by the 5.1 smoke + the real-release dispatch
  # jobs). `shell:` must be a static value (GitHub rejects a matrix expression in
  # `shell:`), so the 5.1 Desktop leg lives in its own job below.
  pester:
    name: Pester (${{ matrix.os }} / pwsh)
    runs-on: ${{ matrix.os }}
    needs: changes
    if: needs.changes.outputs.ps1 == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install Pester (v5)
        shell: pwsh
        run: |
          Install-Module -Name Pester -MinimumVersion 5.0 -Force -Scope CurrentUser -Repository PSGallery -SkipPublisherCheck
      - name: Run Pester
        shell: pwsh
        run: |
          Import-Module Pester -MinimumVersion 5.0
          $cfg = New-PesterConfiguration
          $cfg.Run.Path = "tests/install/ps1"
          $cfg.Run.Exit = $true
          $cfg.Output.Verbosity = "Detailed"
          Invoke-Pester -Configuration $cfg

  # Windows PowerShell 5.1 (Desktop) leg — the installer's floor. The full Pester
  # suite runs on pwsh 7 (windows + ubuntu above): it invokes install.ps1 via
  # `& pwsh`, so a 5.1 *host* adds no real 5.1 coverage, and the python-server +
  # Compress-Archive fixture is unreliable under the 5.1 host. The meaningful 5.1
  # signal is this fixture-free smoke, which executes install.ps1 directly under
  # powershell.exe via the test-binary hatch and asserts the PrintPath contract.
  smoke-windows-51:
    name: 5.1 smoke (windows-latest / powershell)
    runs-on: windows-latest
    needs: changes
    if: needs.changes.outputs.ps1 == 'true'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: 5.1 smoke install (powershell.exe)
        shell: powershell
        run: |
          $stub = Join-Path $env:RUNNER_TEMP 'ocx.exe'
          Set-Content -Path $stub -Value '@echo 0.0.0' -Encoding ascii
          $env:OCX_HOME = Join-Path $env:RUNNER_TEMP '.ocx'
          $env:OCX_NO_MODIFY_PATH = '1'
          $env:__OCX_TESTING_INSTALL_BINARY = $stub
          $out = powershell.exe -NoProfile -ExecutionPolicy Bypass -File src/install.ps1 -NoSetup -PrintPath -NoSmoketest
          if ($LASTEXITCODE -ne 0) { throw "install.ps1 exited $LASTEXITCODE" }
          $binDir = ($out | Select-Object -Last 1)
          if (-not (Test-Path (Join-Path $binDir 'ocx.exe'))) {
            throw "expected ocx.exe under printed bin dir: $binDir"
          }

  # Real-release smoke: installs the real ocx from the live dist.json (network,
  # non-hermetic). Runs nightly + on manual dispatch — kept off per-commit because
  # an installer-code change does not alter what the live server serves, so a
  # per-push run only adds network flake, not signal.
  install-sh-real:
    name: install.sh (real release)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Run install.sh against the real release
        run: |
          args=""
          if [ -n "${{ inputs.release_tag }}" ]; then
            args="--version $(echo '${{ inputs.release_tag }}' | sed 's/^v//')"
          fi
          # shellcheck disable=SC2086
          OCX_NO_MODIFY_PATH=1 OCX_INSTALL_PRINT_PATH=1 sh src/install.sh $args
      - name: Verify
        run: |
          export PATH="$HOME/.ocx/symlinks/ocx.sh/ocx/cli/current/content/bin:$PATH"
          ocx version

  install-ps1-windows:
    name: install.ps1 (Windows / ${{ matrix.shell }}, real release)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        # powershell = Windows PowerShell 5.1 (Desktop); pwsh = PowerShell 7.
        # 5.1's Invoke-WebRequest signals a -MaximumRedirection 0 redirect with a
        # different (Location-less, .Response-free) exception than 7, so the real
        # GitHub 302 -> objects.githubusercontent.com asset hop MUST run on BOTH to
        # catch edition-specific download/redirect regressions. (A pwsh-only leg
        # let a 5.1 strict-mode crash in the redirect path ship undetected.)
        shell: [powershell, pwsh]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      # Host shell is pwsh; the matrix selects the interpreter that actually RUNS
      # install.ps1 (5.1 powershell.exe is on PATH on windows runners). The edition
      # under test is the nested process, not the harness shell.
      - name: Run install.ps1
        shell: pwsh
        run: |
          $a = @()
          if ("${{ inputs.release_tag }}") {
            $a += "-Version"
            $a += "${{ inputs.release_tag }}".TrimStart('v')
          }
          $env:OCX_NO_MODIFY_PATH = "1"
          ${{ matrix.shell }} -NoProfile -File src/install.ps1 @a
      - name: Verify
        shell: pwsh
        run: |
          $bin = Join-Path $env:USERPROFILE '.ocx\symlinks\ocx.sh\ocx\cli\current\content\bin'
          $env:Path = "$bin;$env:Path"
          ocx version

  # install.ps1 on Linux + macOS via pwsh 7 (real release). install.ps1 is
  # cross-platform, so a pwsh user on Unix gets a real install (the `ocx` binary
  # under <home>/.ocx). Nightly + manual dispatch, like the install-sh-real jobs.
  install-ps1-unix:
    name: install.ps1 (${{ matrix.os }}, real release)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Run install.ps1
        shell: pwsh
        run: |
          $a = @()
          if ("${{ inputs.release_tag }}") {
            $a += "-Version"
            $a += "${{ inputs.release_tag }}".TrimStart('v')
          }
          $env:OCX_NO_MODIFY_PATH = "1"
          pwsh -NoProfile -File src/install.ps1 @a
      - name: Verify
        shell: pwsh
        run: |
          $bin = Join-Path $env:HOME '.ocx/symlinks/ocx.sh/ocx/cli/current/content/bin'
          $env:PATH = "$bin" + [System.IO.Path]::PathSeparator + $env:PATH
          ocx version
