name: Test installers

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to test against (e.g. v0.5.0). Defaults to latest.'
        required: false

permissions:
  contents: read

jobs:
  # Linux: the nu/fish/elvish interpreters are bootstrapped from ocx.toml by the
  # setup-ocx action (installs ocx + `ocx pull`); the suite runs under `ocx run
  # nushell fish elvish` so the per-shell suites EXECUTE rather than self-skip on
  # `command -v`. The cross-distro libc matrix lives in verify-distros.yml.
  bats-linux:
    name: Bats (ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive
      - uses: ocx-sh/setup-ocx@8cd2f38eed07c9b79aaed22e61f9ba6b36e967a3 # v1.2.2
      - name: Run bats (vendored, shells via ocx.toml)
        run: ocx run nushell fish elvish -- external/bats-core/bin/bats -r tests/install/

  # NOTE: macOS is intentionally not in the BATS matrix. The runner ships bash 3.2
  # (no negative array subscripts — the suites use `${lines[-1]}`), and ocx has no
  # darwin/arm64 leaf for nu/fish/elvish at the locked version, so the per-shell
  # suites cannot be bootstrapped there. Linux (bats-linux + verify-distros.yml)
  # covers the POSIX + exotic installers. macOS IS covered for PowerShell, though:
  # the Pester job below runs on macos-latest (fixture-based, no real darwin ocx
  # needed), and the workflow_dispatch real-release jobs exercise the live path.

  # PowerShell 7 (pwsh) on Windows + Linux + macOS. install.ps1 is cross-platform
  # (it resolves *-unknown-linux-{gnu,musl} / *-apple-darwin targets and the `ocx`
  # binary on Unix), so the full download -> .tar.xz extract -> `self setup` path
  # EXECUTES on the POSIX hosts (ubuntu + macos) against the fixture stub. The few
  # scenarios that run the stub self-skip on Windows (the shell-script stub is not
  # a PE; Windows execution is covered by the 5.1 smoke + the real-release dispatch
  # jobs). `shell:` must be a static value (GitHub rejects a matrix expression in
  # `shell:`), so the 5.1 Desktop leg lives in its own job below.
  pester:
    name: Pester (${{ matrix.os }} / pwsh)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install Pester (v5)
        shell: pwsh
        run: |
          Install-Module -Name Pester -MinimumVersion 5.0 -Force -Scope CurrentUser -Repository PSGallery -SkipPublisherCheck
      - name: Run Pester
        shell: pwsh
        run: |
          Import-Module Pester -MinimumVersion 5.0
          $cfg = New-PesterConfiguration
          $cfg.Run.Path = "tests/install/ps1"
          $cfg.Run.Exit = $true
          $cfg.Output.Verbosity = "Detailed"
          Invoke-Pester -Configuration $cfg

  # Windows PowerShell 5.1 (Desktop) leg — the installer's floor. The full Pester
  # suite runs on pwsh 7 (windows + ubuntu above): it invokes install.ps1 via
  # `& pwsh`, so a 5.1 *host* adds no real 5.1 coverage, and the python-server +
  # Compress-Archive fixture is unreliable under the 5.1 host. The meaningful 5.1
  # signal is this fixture-free smoke, which executes install.ps1 directly under
  # powershell.exe via the test-binary hatch and asserts the PrintPath contract.
  smoke-windows-51:
    name: 5.1 smoke (windows-latest / powershell)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: 5.1 smoke install (powershell.exe)
        shell: powershell
        run: |
          $stub = Join-Path $env:RUNNER_TEMP 'ocx.exe'
          Set-Content -Path $stub -Value '@echo 0.0.0' -Encoding ascii
          $env:OCX_HOME = Join-Path $env:RUNNER_TEMP '.ocx'
          $env:OCX_NO_MODIFY_PATH = '1'
          $env:__OCX_TESTING_INSTALL_BINARY = $stub
          $out = powershell.exe -NoProfile -ExecutionPolicy Bypass -File src/install.ps1 -NoSetup -PrintPath -NoSmoketest
          if ($LASTEXITCODE -ne 0) { throw "install.ps1 exited $LASTEXITCODE" }
          $binDir = ($out | Select-Object -Last 1)
          if (-not (Test-Path (Join-Path $binDir 'ocx.exe'))) {
            throw "expected ocx.exe under printed bin dir: $binDir"
          }

  # Real-release smoke: installs the real ocx from the live dist.json. The
  # project is pre-release (no dist.json published yet), so these run on manual
  # dispatch only — enable them once the first release ships.
  install-sh-real:
    name: install.sh (real release)
    if: github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Run install.sh against the real release
        run: |
          args=""
          if [ -n "${{ inputs.release_tag }}" ]; then
            args="--version $(echo '${{ inputs.release_tag }}' | sed 's/^v//')"
          fi
          # shellcheck disable=SC2086
          OCX_NO_MODIFY_PATH=1 OCX_INSTALL_PRINT_PATH=1 sh src/install.sh $args
      - name: Verify
        run: |
          export PATH="$HOME/.ocx/symlinks/ocx.sh/ocx/cli/current/content/bin:$PATH"
          ocx version

  install-ps1-windows:
    name: install.ps1 (Windows, real release)
    if: github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Run install.ps1
        shell: pwsh
        run: |
          $a = @()
          if ("${{ inputs.release_tag }}") {
            $a += "-Version"
            $a += "${{ inputs.release_tag }}".TrimStart('v')
          }
          $env:OCX_NO_MODIFY_PATH = "1"
          pwsh -NoProfile -File src/install.ps1 @a
      - name: Verify
        shell: pwsh
        run: |
          $bin = Join-Path $env:USERPROFILE '.ocx\symlinks\ocx.sh\ocx\cli\current\content\bin'
          $env:Path = "$bin;$env:Path"
          ocx version

  # install.ps1 on Linux + macOS via pwsh 7 (real release). install.ps1 is
  # cross-platform, so a pwsh user on Unix gets a real install (the `ocx` binary
  # under <home>/.ocx). Manual dispatch only, like the install-sh-real jobs.
  install-ps1-unix:
    name: install.ps1 (${{ matrix.os }}, real release)
    if: github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Run install.ps1
        shell: pwsh
        run: |
          $a = @()
          if ("${{ inputs.release_tag }}") {
            $a += "-Version"
            $a += "${{ inputs.release_tag }}".TrimStart('v')
          }
          $env:OCX_NO_MODIFY_PATH = "1"
          pwsh -NoProfile -File src/install.ps1 @a
      - name: Verify
        shell: pwsh
        run: |
          $bin = Join-Path $env:HOME '.ocx/symlinks/ocx.sh/ocx/cli/current/content/bin'
          $env:PATH = "$bin" + [System.IO.Path]::PathSeparator + $env:PATH
          ocx version
