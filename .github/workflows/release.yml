name: Release

on:
  push:
    tags:
      - "v*"

permissions: {}

jobs:
  release:
    name: GitHub release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Determine channel
        id: channel
        env:
          TAG: ${{ github.ref_name }}
        run: |
          case "$TAG" in
            *-*)
              echo "prerelease=true" >> "$GITHUB_OUTPUT"
              echo "make_latest=false" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "prerelease=false" >> "$GITHUB_OUTPUT"
              echo "make_latest=true" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Generate release notes
        id: changelog
        uses: orhun/git-cliff-action@c93ef52f3d0ddcdcc9bd5447d98d458a11cd4f72 # v4
        with:
          # Stable releases restrict the tag boundaries to stable tags so a
          # prerelease tag (vX.Y.Z-rc.N) does not truncate --latest's range —
          # the notes then cover every commit since the previous STABLE release
          # (the rc tag is transparent). Prereleases use the default --latest.
          args: ${{ steps.channel.outputs.prerelease == 'true' && '--latest --strip header' || '--latest --tag-pattern ^v[0-9]+\.[0-9]+\.[0-9]+$ --strip header' }}
        env:
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          body: ${{ steps.changelog.outputs.content }}
          prerelease: ${{ steps.channel.outputs.prerelease }}
          make_latest: ${{ steps.channel.outputs.make_latest }}

      - name: Update major version tag
        if: steps.channel.outputs.prerelease == 'false'
        env:
          TAG: ${{ github.ref_name }}
        run: |
          major="${TAG%%.*}"
          git tag -f "$major"
          git push origin "$major" --force

  publish-installers:
    name: Publish installers to setup.ocx.sh
    needs: [release]
    runs-on: ubuntu-latest
    environment: setup.ocx.sh
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_SSH_KNOWN_HOSTS: ${{ secrets.DEPLOY_SSH_KNOWN_HOSTS }}
        run: |
          test -n "$DEPLOY_SSH_KEY" || { echo "DEPLOY_SSH_KEY secret is empty" >&2; exit 1; }
          test -n "$DEPLOY_SSH_KNOWN_HOSTS" || { echo "DEPLOY_SSH_KNOWN_HOSTS secret is empty" >&2; exit 1; }
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$DEPLOY_SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
          # Validate the private key parses, and log its derived public key
          # (public keys are not secret) so it can be matched against the deploy
          # user's authorized_keys on the server.
          if ! ssh-keygen -y -f ~/.ssh/id_ed25519 > ~/.ssh/id_ed25519.pub; then
            echo "DEPLOY_SSH_KEY is not a valid OpenSSH private key (the secret must hold real newlines, not one collapsed line)" >&2
            exit 1
          fi
          echo "Deploy public key (add to the deploy user's ~/.ssh/authorized_keys):" >&2
          cat ~/.ssh/id_ed25519.pub >&2

      - name: Publish
        env:
          TAG: ${{ github.ref_name }}
          SSH_KEY: /home/runner/.ssh/id_ed25519
          SETUP_OCX_HOST: ${{ secrets.DEPLOY_HOST }}
          SSH_PORT: ${{ secrets.DEPLOY_PORT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${TAG#v}" scripts/publish-installers.sh
