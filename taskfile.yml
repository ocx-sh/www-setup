# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

env:
  OCX_INDEX: '{{.ROOT_DIR}}/.ocx/index'

includes:
  shell: ./taskfiles/shell.taskfile.yml
  pwsh: ./taskfiles/pwsh.taskfile.yml
  nu: ./taskfiles/nu.taskfile.yml
  fish: ./taskfiles/fish.taskfile.yml
  elvish: ./taskfiles/elvish.taskfile.yml
  test: ./taskfiles/test.taskfile.yml
  docker: ./taskfiles/docker.taskfile.yml
  release: ./taskfiles/release.taskfile.yml
  meta: ./taskfiles/meta.taskfile.yml
  # Tool registrations (backed by ocx.taskfile.yml).
  # NAME is the binding declared in ocx.toml [tools]; `ocx run NAME -- BINARY`
  # composes the toolchain env. Hallucinated OCX packages (bats, hawkeye,
  # actionlint) are NOT registered here — they stay system tools behind a
  # `command -v` precondition (see meta/test taskfiles).
  shellcheck:
    taskfile: ./taskfiles/ocx.taskfile.yml
    internal: true
    vars:
      NAME: shellcheck
      TOOL: shellcheck
      GLOB: '*.sh'
  shfmt:
    taskfile: ./taskfiles/ocx.taskfile.yml
    internal: true
    vars:
      NAME: shfmt
      TOOL: shfmt
      GLOB: '*.sh'
  lychee:
    taskfile: ./taskfiles/ocx.taskfile.yml
    internal: true
    vars:
      NAME: lychee
      TOOL: lychee
      GLOB: '*.md'
  git-cliff:
    taskfile: ./taskfiles/ocx.taskfile.yml
    internal: true
    vars:
      NAME: git-cliff
      TOOL: git-cliff
      GLOB: 'cliff.toml'

tasks:
  ocx:lock:
    desc: Re-resolve ocx.toml tool tags to digests and materialize the object store.
    # Reads every [tools] binding from ocx.toml, resolves each tag to a digest,
    # writes ocx.lock, and pre-warms the object store. This is the single source
    # of truth for the toolchain — the shell lint/test gates bootstrap their
    # interpreters (nu/fish/elvish/pwsh) from these same bindings via `ocx run`.
    cmds:
      - ocx lock

  ocx:lock:check:
    desc: CI primitive — assert ocx.lock is current relative to ocx.toml (exit 65 if stale).
    cmds:
      - ocx lock --check

  # Two-phase verify: parallel lint, then sequential tests.
  verify:
    desc: Full quality gate (lint + bats + pester)
    summary: |
      Phase 1 (parallel): shell:verify, pwsh:verify, meta:verify
      Phase 2 (sequential): test:bats, test:pester
    cmds:
      - task: .verify:lint
      - task: .verify:tests

  .verify:lint:
    internal: true
    deps:
      - task: shell:verify
      - task: pwsh:verify
      - task: nu:verify
      - task: fish:verify
      - task: elvish:verify
      - task: meta:verify

  .verify:tests:
    internal: true
    cmds:
      - task: test:bats
      - task: test:pester

  publish:dry-run:
    desc: Validate publish-installers.sh STABLE archive/+latest rsync targets, offline (no upload; run 'task dist' for the manifest).
    vars:
      # Strip any leading v AND any prerelease suffix so this always exercises
      # the stable channel (the latest/install.* pointers).
      VERSION:
        sh: 'ocx run git-cliff -- git-cliff --bumped-version 2>/dev/null | sed "s/^v//; s/-.*//" || echo "0.0.0"'
    cmd: DRY_RUN=1 VERSION={{.VERSION}} SSH_KEY=/dev/null SETUP_OCX_HOST=setup.ocx.sh scripts/publish-installers.sh

  publish:dev-dry-run:
    desc: Validate publish-installers.sh NEXT (prerelease) archive/+next rsync targets, offline (no upload; run 'task dist' for the manifest).
    vars:
      # Force a prerelease VERSION so the next/ channel pointers are exercised.
      # Override with VERSION=X.Y.Z-rc.N on the CLI.
      VERSION: '{{.VERSION | default "0.0.0-dev.0"}}'
    cmd: DRY_RUN=1 VERSION={{.VERSION}} SSH_KEY=/dev/null SETUP_OCX_HOST=setup.ocx.sh scripts/publish-installers.sh

  dist:
    # Sourced from the ocx-sh/ocx GitHub Releases API (NOT this repo's tags), so
    # this makes a live api.github.com call (unauthenticated unless GITHUB_TOKEN
    # is exported; subject to the 60/hr unauth rate limit). Per release it also
    # fetches each release's sha256.sum asset to inline the per-target checksums.
    desc: Print the distribution manifest (dist.json) from the ocx-sh/ocx Releases API.
    cmd: scripts/gen-dist.sh

  format:
    desc: Auto-format shell scripts
    cmds:
      - task: shell:format
